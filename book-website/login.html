<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>后台登录 - 云上书房</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fff7e6, #eadfcc);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2d2118;
    }

    .login-card {
      width: 380px;
      background: white;
      padding: 36px;
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      color: #7a6046;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #ddd;
      margin-bottom: 18px;
      font-size: 15px;
      outline: none;
      background: #fffaf2;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: #2d2118;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #4a3628;
    }

    .message {
      margin-top: 16px;
      color: #a33;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h1>后台登录</h1>
    <p>登录后管理书籍、封面和章节。</p>

    <label>用户名</label>
    <input id="username" placeholder="请输入用户名">

    <label>密码</label>
    <input id="password" type="password" placeholder="请输入密码">

    <button onclick="login()">登录</button>

    <div class="message" id="message"></div>
  </div>

  <script>
    const API_BASE = "http://localhost:3000";
const adminToken = localStorage.getItem("adminToken");

if (!adminToken) {
  window.location.href = "login.html";
}

function getAuthHeaders() {
  return {
    Authorization: "Bearer " + adminToken
  };
}

function logout() {
  localStorage.removeItem("adminToken");
  window.location.href = "login.html";
}

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        document.getElementById("message").innerText = "请输入用户名和密码。";
        return;
      }

      try {
        const res = await fetch(API_BASE + "/api/admin/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: username,
            password: password
          })
        });

        const result = await res.json();

        if (!res.ok) {
          document.getElementById("message").innerText = result.message;
          return;
        }

        localStorage.setItem("adminToken", result.token);

        window.location.href = "admin.html";

      } catch (error) {
        document.getElementById("message").innerText =
          "登录失败，请确认后端服务正在运行。";
      }
    }
  </script>

</body>
</html>
